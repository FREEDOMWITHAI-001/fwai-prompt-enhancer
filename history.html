<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Genius - History</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
          </svg>
        </div>
        <div>
          <h1>Prompt History</h1>
          <p class="subtitle">Your enhanced prompts</p>
        </div>
      </div>
      <div class="header-right">
        <span class="total-count" id="totalCount">0 prompts</span>
        <button class="btn-clear" id="clearAllBtn">Clear All</button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search your prompts..." />
    </div>

    <!-- History List -->
    <div id="historyList" class="history-list"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <p>No prompts enhanced yet</p>
      <p class="empty-hint">Go to any AI chat and click the Enhance button to get started</p>
    </div>

    <!-- Load More -->
    <div id="loadMore" class="load-more" style="display:none;">
      <button class="btn-load-more" id="loadMoreBtn">Load More</button>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
