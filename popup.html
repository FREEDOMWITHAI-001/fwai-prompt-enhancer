<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Genius</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
      </div>
      <div>
        <h1>Prompt Genius</h1>
        <p class="subtitle">Supercharge your AI prompts</p>
      </div>
    </header>

    <!-- Dashboard -->
    <div id="dashboardView" class="view">
      <!-- Stats -->
      <div class="stats-card">
        <div class="stat-row">
          <span class="stat-label">Prompts Enhanced</span>
          <span class="stat-value" id="enhanceCount">0</span>
        </div>
      </div>

      <!-- Enhancement Style -->
      <section class="section">
        <label class="section-label">Enhancement Style</label>
        <div class="btn-group" id="styleGroup">
          <button data-value="concise" class="btn-option">Concise</button>
          <button data-value="balanced" class="btn-option active">Balanced</button>
          <button data-value="detailed" class="btn-option">Detailed</button>
        </div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-secondary" id="historyBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Prompt History
        </button>
      </div>

      <!-- How to Use -->
      <div class="how-to-use">
        <p>Type in any AI chat, then click the <strong>Enhance</strong> button or press <kbd>Ctrl+Shift+E</kbd></p>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
